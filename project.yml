name: StikPair
options:
  bundleIdPrefix: com.stik
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

targets:
  StikPair:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - StikPair.icon
      - path: App/StikPair.icon
        buildPhase: resources
    dependencies:
      - framework: StikPairFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stik.StikPair
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: StikPair
        OTHER_LDFLAGS: "-lc++"
        GENERATE_INFOPLIST_FILE: NO
